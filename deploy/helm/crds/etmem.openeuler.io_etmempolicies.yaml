            type: string
          metadata:
            type: object
          spec:
            properties:
              circuitBreaker:
                description: CircuitBreaker configures automatic safety thresholds.
                properties:
                  nodeMemoryPSIThresholdPercent:
                    default: 80
                    description: NodeMemoryPSIThresholdPercent triggers node-level
                      circuit breaker when PSI exceeds this.
                    type: integer
                  podRestartThreshold:
                    default: 3

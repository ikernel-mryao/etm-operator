apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: etmem-agent
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: etmem-agent
  template:
    metadata:
      labels:
        app: etmem-agent
    spec:
      hostPID: true
      # etmemd 使用抽象 Unix socket（内核网络命名空间），必须共享宿主机网络才能访问
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ .Values.serviceAccount.agent.name }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.agent.image }}
          imagePullPolicy: {{ .Values.agent.imagePullPolicy | default "IfNotPresent" }}
          args:
            - --reconcile-interval={{ .Values.agent.reconcileInterval }}
            - --socket-name={{ .Values.agent.socketName }}
          securityContext:
            privileged: false
            capabilities:
              add: [SYS_PTRACE]
            runAsUser: 0
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            - name: etmem-bin
              mountPath: /usr/bin/etmem
              readOnly: true
            # etmem 为动态链接，需要宿主机的动态链接器和共享库
            - name: host-lib64
              mountPath: /lib64
              readOnly: true
            - name: host-usr-lib64
              mountPath: /usr/lib64
              readOnly: true
            # etmemd 在宿主机侧读取配置文件，Agent 写入的路径必须宿主机可见
            - name: etmem-config-dir
              mountPath: /var/run/etmem/configs
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: etmem-bin
          hostPath:
            path: /usr/bin/etmem
            type: File
        - name: host-lib64
          hostPath:
            path: /lib64
            type: Directory
        - name: host-usr-lib64
          hostPath:
            path: /usr/lib64
            type: Directory
        - name: etmem-config-dir
          hostPath:
            path: /var/run/etmem/configs
            type: DirectoryOrCreate
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
